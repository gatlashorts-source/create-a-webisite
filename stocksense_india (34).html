<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>StockSense India - Sector View</title><style>:root{--bg:#0f1117;--s1:#161b27;--s2:#1e2535;--bd:#2a3550;--ac:#3b82f6;--cy:#06b6d4;--up:#10b981;--dn:#ef4444;--nt:#f59e0b;--tx:#e2e8f0;--mu:#64748b;--dm:#2d3f5a;--f:'Syne',sans-serif;--m:'JetBrains Mono',monospace;}*{margin:0;padding:0;box-sizing:border-box;}body{background:var(--bg);color:var(--tx);font-family:var(--f);padding:20px;}.container{max-width:1200px;margin:0 auto;}.header{margin-bottom:30px;}.title{font-size:32px;font-weight:800;margin-bottom:10px;}.subtitle{font-size:14px;color:var(--mu);font-family:var(--m);}.sectors-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;}.sector-card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:20px;transition:all .3s;cursor:pointer;}.sector-card:hover{transform:translateY(-4px);border-color:var(--ac);box-shadow:0 8px 24px rgba(59,130,246,.2);}.sector-name{font-size:16px;font-weight:700;margin-bottom:12px;}.sector-price{font-size:24px;font-weight:800;margin-bottom:8px;}.sector-change{display:flex;align-items:center;gap:8px;font-family:var(--m);font-size:14px;font-weight:700;}.change-positive{color:var(--up);}.change-negative{color:var(--dn);}.change-arrow{font-size:18px;}</style></head><body><div class="container"><div class="header"><div class="title">📊 NSE Sector Indices</div><div class="subtitle">Live sector performance with price momentum & percentage</div></div><div class="sectors-grid" id="sectorsGrid"></div></div><script>const sectorData=[{name:'NIFTY',price:22512.65,change:-601.85,percent:-2.60},{name:'BANKNIFTY',price:51437.75,change:-1989.30,percent:-3.72},{name:'CNXFINANCE',price:23959.20,change:-821.95,percent:-3.32},{name:'NIFTYPVTB',price:24436.90,change:-830.75,percent:-3.29},{name:'CNXIT',price:29147.05,change:-52.55,percent:-0.18},{name:'NIFTYJR',price:61414.90,change:-2447.40,percent:-3.83},{name:'CNXMIDCAP',price:52717.55,change:-2137.95,percent:-3.90},{name:'CNXPSUBAI',price:8231.65,change:-352.95,percent:-4.11},{name:'NIFTYMIDC',price:15000.50,change:-572.10,percent:-3.67},{name:'NIFTYSMLC',price:7400.60,change:-282.80,percent:-3.68},{name:'CNXSMALLC',price:15098.70,change:-619.90,percent:-3.94},{name:'NIFTY_IND',price:7390.85,change:-344.65,percent:-4.46},{name:'CPSE',price:6891.40,change:-135.35,percent:-1.93},{name:'CNXCONSU',price:10338.00,change:-333.65,percent:-3.13},{name:'NIFTY_HEA',price:14079.30,change:-304.15,percent:-2.11},{name:'CNXREALTY',price:663.40,change:-33.00,percent:-4.74},{name:'CNXINFRA',price:8573.90,change:-226.25,percent:-2.57},{name:'CNXMEDIA',price:1253.35,change:-51.75,percent:-3.97},{name:'CNXCOMMC',price:9058.15,change:-332.35,percent:-3.54},{name:'CNXPSE',price:9593.70,change:-288.10,percent:-2.92},{name:'CNXAUTO',price:23934.75,change:-781.15,percent:-3.16},{name:'CNXMETAL',price:10863.45,change:-549.30,percent:-4.81},{name:'CNXFMCG',price:45837.05,change:-1170.50,percent:-2.45},{name:'CNXMNC',price:28031.55,change:-843.45,percent:-2.92},{name:'CNXPHARM',price:22053.10,change:-487.60,percent:-2.16},{name:'CNXENERG',price:34839.45,change:-1068.85,percent:-2.98},{name:'NIFTY_OIL',price:10737.85,change:-297.10,percent:-2.69},{name:'NIFTY_MICI',price:19006.90,change:-920.60,percent:-4.62}];function renderSectors(){const grid=document.getElementById('sectorsGrid');grid.innerHTML=sectorData.map(sector=>{const isPositive=sector.change>=0;const color=isPositive?'var(--up)':'var(--dn)';const arrow=isPositive?'▲':'▼';return `<div class="sector-card"><div class="sector-name">${sector.name}</div><div class="sector-price" style="color:${color}">₹${sector.price.toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2})}</div><div class="sector-change ${isPositive?'change-positive':'change-negative'}"><span class="change-arrow">${arrow}</span><span>${isPositive?'+':''}${sector.change.toFixed(2)} (${isPositive?'+':''}${sector.percent.toFixed(2)}%)</span></div></div>`;}).join('');}renderSectors();</script></body></html>
